<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cross Product: r × ω</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(10,10,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Mouse Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Parameters
const radius = 5;
const omegaMagnitude = 2;
const arrowScale = 0.5;

// Helper function
function createArrow(dir, origin, color) {
    const length = dir.length();
    const arrow = new THREE.ArrowHelper(dir.clone().normalize(), origin, length, color, 0.5, 0.3);
    scene.add(arrow);
    return arrow;
}

// ω vector
const omega = new THREE.Vector3(0,0,omegaMagnitude);
const omegaArrow = createArrow(omega, new THREE.Vector3(0,0,0), 0xff0000);

// r vector
let theta = 0;
let rVec = new THREE.Vector3(radius*Math.cos(theta), radius*Math.sin(theta), 0);
let rArrow = createArrow(rVec, new THREE.Vector3(0,0,0), 0x0000ff);

// v = ω × r
let vVec = new THREE.Vector3().crossVectors(omega, rVec);
let vArrow = createArrow(vVec.multiplyScalar(arrowScale), rVec, 0x00ff00);

// Ring
const ringGeometry = new THREE.RingGeometry(radius-0.05, radius+0.05, 64);
const ringMaterial = new THREE.MeshBasicMaterial({color:0x888888, side:THREE.DoubleSide});
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
scene.add(ring);

// Light
const light = new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

// Animation
function animate() {
    requestAnimationFrame(animate);

    theta += 0.05;

    rVec.set(radius*Math.cos(theta), radius*Math.sin(theta), 0);
    rArrow.setDirection(rVec.clone().normalize());
    rArrow.setLength(rVec.length());

    vVec.crossVectors(omega, rVec);
    vArrow.position.copy(rVec);
    vArrow.setDirection(vVec.clone().normalize());
    vArrow.setLength(vVec.length()*arrowScale);

    controls.update();
    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
